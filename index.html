<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do List</title>

    <style>
        body{
            margin: 0;
            background-color: #f0f2f5;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            gap: 12px;

            background-color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            padding: 30px;
            width: 350px;
        }   
        
    </style>
</head>
<body>
    <div class="container">
        <header> <h1>To Do List</h1> </header>
        <main>
            <input type="text" id="input" placeholder="Escreva algo aqui!">
            <button id="btnAdicionar"> Adicionar</button>
        </main>
        <ul id="item"> </ul>
    </div>
        
    <script src="script.js"></script>
</body>
</html>
